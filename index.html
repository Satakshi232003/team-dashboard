<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Team Members</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0f172a;
color:white;
text-align:center;
}

h1{
margin-top:40px;
}

.team{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:50px;
}

.member{
background:#1e293b;
padding:20px;
border-radius:12px;
width:180px;
transition:0.3s;
cursor:pointer;
}

.member:hover{
transform:translateY(-8px);
background:#334155;
}

.member img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
}

.member h3{
margin-top:10px;
}

a{
text-decoration:none;
color:white;
}

</style>

</head>

<body>

<h1>Our Team</h1>
<p>Select your profile to login</p>

<div class="team">

<a href="login.html">
<div class="member">
<img src="images/satakshi.jpg">
<h3>Satakshi</h3>
</div>
</a>

<a href="login.html">
<div class="member">
<img src="images/member2.png">

</div>
</a>

<a href="login.html">
<div class="member">
<img src="images/member3.png">

</div>
</a>

<a href="login.html">

</div>

</div>

</body>
</html>
