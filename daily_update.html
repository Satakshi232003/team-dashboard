<!DOCTYPE html>
<html>
<head>

<title>Daily Updates</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
display:flex;
background:#0f172a;
color:white;
}

/* SIDEBAR */

.sidebar{
width:230px;
height:100vh;
background:#020617;
padding:25px;
position:fixed;
}

.sidebar h2{
margin-bottom:35px;
}

.sidebar a{
display:block;
padding:12px;
color:#cbd5e1;
text-decoration:none;
margin-bottom:8px;
border-radius:8px;
}

.sidebar a:hover{
background:#1e293b;
color:white;
}

.sidebar button{
margin-top:20px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
cursor:pointer;
}

/* MAIN */

.main{
margin-left:230px;
padding:30px;
width:100%;
}

/* HEADER */

.header{
margin-bottom:25px;
}

.header h1{
font-size:28px;
}

/* UPDATE BOX */

.update-box{
background:#1e293b;
padding:25px;
border-radius:12px;
margin-bottom:25px;
max-width:600px;
}

.update-box textarea{
width:100%;
height:100px;
padding:12px;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
margin-bottom:10px;
}

.update-box button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.update-box button:hover{
background:#2563eb;
}

/* UPDATE LIST */

.update-list{
background:#1e293b;
padding:25px;
border-radius:12px;
max-width:700px;
}

.update-item{
padding:10px 0;
border-bottom:1px solid #334155;
}

.time{
font-size:12px;
color:#94a3b8;
margin-top:4px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Project</h2>

<a href="dashboard.html">🏠 Dashboard</a>
<a href="assign_task.html">📌 Assign Task</a>
<a href="my_tasks.html">✔ My Tasks</a>
<a href="daily_update.html">📝 Daily Updates</a>
<a href="project_files.html">📁 Project Files</a>
<a href="team.html">👥 Team Members</a>

<button onclick="logout()">Logout</button>

</div>


<!-- MAIN -->

<div class="main">

<div class="header">
<h1>Daily Updates</h1>
</div>

<!-- UPDATE FORM -->

<div class="update-box">

<textarea id="updateText" placeholder="Write today's update..."></textarea>

<button onclick="submitUpdate()">Submit Update</button>

<p id="msg"></p>

</div>


<!-- UPDATE HISTORY -->

<div class="update-list">

<h3>My Updates</h3>

<div id="updateList"></div>

</div>

</div>

<script>

var scriptURL="https://script.google.com/macros/s/AKfycbw9BIHeWBwXOfeZ85AevN2RK4JI6y8NDtvZ2gya2LXy2qzl2N71hmLXhl0qJBRPH_R_qQ/exec";

let user = localStorage.getItem("username")


// LOAD UPDATES

function loadUpdates(){

fetch(scriptURL+"?action=updates&username="+user)

.then(res=>res.json())

.then(data=>{

let html=""

data.reverse().forEach(u=>{

html+=`

<div class="update-item">

<div>${u.update}</div>

<div class="time">${u.time}</div>

</div>

`

})

document.getElementById("updateList").innerHTML=html

})

}

loadUpdates()


// SUBMIT UPDATE

function submitUpdate(){

var text=document.getElementById("updateText").value

fetch(scriptURL+"?action=addUpdate&username="+user+"&update="+text)

.then(res=>res.text())

.then(data=>{

document.getElementById("msg").innerHTML="Update saved"

document.getElementById("updateText").value=""

loadUpdates()

})

}


// LOGOUT

function logout(){

var user = localStorage.getItem("username");

if(user){

fetch(scriptURL+"?action=logout&username="+user);

}

localStorage.removeItem("username");

window.location.href="login.html";

}

</script>

</body>
</html>
