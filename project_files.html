<!DOCTYPE html>
<html>
<head>

<title>Project Files</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
display:flex;
background:#0f172a;
color:white;
}

/* SIDEBAR */

.sidebar{
width:230px;
height:100vh;
background:#020617;
padding:25px;
position:fixed;
}

.sidebar h2{
margin-bottom:35px;
}

.sidebar a{
display:block;
padding:12px;
color:#cbd5e1;
text-decoration:none;
margin-bottom:8px;
border-radius:8px;
}

.sidebar a:hover{
background:#1e293b;
color:white;
}

.sidebar button{
margin-top:20px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
cursor:pointer;
}

/* MAIN */

.main{
margin-left:230px;
padding:30px;
width:100%;
}

/* HEADER */

.header{
margin-bottom:30px;
}

.header h1{
font-size:28px;
}

/* FILE GRID */

.file-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.file-card{
background:#1e293b;
padding:20px;
border-radius:12px;
text-align:center;
transition:0.3s;
}

.file-card:hover{
transform:translateY(-5px);
background:#334155;
}

.file-card a{
color:white;
text-decoration:none;
}

.file-icon{
font-size:35px;
margin-bottom:10px;
}

.file-size{
font-size:12px;
color:#94a3b8;
margin-top:5px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Project</h2>

<a href="dashboard.html">🏠 Dashboard</a>
<a href="assign_task.html">📌 Assign Task</a>
<a href="my_tasks.html">✔ My Tasks</a>
<a href="daily_update.html">📝 Daily Updates</a>
<a href="project_files.html">📁 Project Files</a>
<a href="team.html">👥 Team Members</a>

<button onclick="logout()">Logout</button>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">
<h1>Project Files</h1>
</div>

<div class="file-grid" id="fileList"></div>

</div>

<script>

var scriptURL="https://script.google.com/macros/s/AKfycbw9BIHeWBwXOfeZ85AevN2RK4JI6y8NDtvZ2gya2LXy2qzl2N71hmLXhl0qJBRPH_R_qQ/exec";

let user = localStorage.getItem("username")


// LOAD FILES FROM SHEET

fetch(scriptURL+"?action=files&username="+user)

.then(res=>res.json())

.then(data=>{

let html=""

data.forEach(f=>{

html+=`

<div class="file-card">

<a href="${f.link}" target="_blank">

<div class="file-icon">📄</div>

<div>${f.name}</div>

<div class="file-size">${f.size}</div>

</a>

</div>

`

})

document.getElementById("fileList").innerHTML=html

})


// LOGOUT

function logout(){

var user = localStorage.getItem("username");

if(user){

fetch(scriptURL+"?action=logout&username="+user);

}

localStorage.removeItem("username");

window.location.href="login.html";

}

</script>

</body>
</html>
